name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          generate_release_notes: true

      - name: Publish to GitHub Packages
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view @georgiosnikitas/brain-break@${VERSION} --registry=https://npm.pkg.github.com 2>/dev/null; then
            echo "Version ${VERSION} already published, skipping"
          else
            npm publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  homebrew:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Compute SHA256 of source tarball
        id: sha
        run: |
          TARBALL_URL="https://github.com/georgiosnikitas/brain-break/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"
          SHA256=$(curl -sL "$TARBALL_URL" | shasum -a 256 | awk '{print $1}')
          if [[ -z "$SHA256" || "$SHA256" == "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855" ]]; then
            echo "ERROR: Could not compute SHA256 for ${GITHUB_REF_NAME}"
            exit 1
          fi
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew tap repo
        uses: actions/checkout@v4
        with:
          repository: georgiosnikitas/homebrew-brain-break
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256="${{ steps.sha.outputs.sha256 }}"
          TAG="${GITHUB_REF_NAME}"

          mkdir -p Formula

          cat > Formula/brain-break.rb << 'FORMULA_EOF'
          # Formula for georgiosnikitas/homebrew-brain-break
          class BrainBreak < Formula
            desc "An AI-powered terminal quiz app"
            homepage "https://github.com/georgiosnikitas/brain-break"
          FORMULA_EOF

          # Append dynamic fields (outside heredoc to allow variable expansion)
          cat >> Formula/brain-break.rb << FORMULA_EOF
            url "https://github.com/georgiosnikitas/brain-break/archive/refs/tags/${TAG}.tar.gz"
            sha256 "${SHA256}"
          FORMULA_EOF

          cat >> Formula/brain-break.rb << 'FORMULA_EOF'
            license "MIT"
            head "https://github.com/georgiosnikitas/brain-break.git", branch: "main"

            depends_on "node"

            def install
              node_version = Utils.safe_popen_read(Formula["node"].opt_bin/"node", "--version").strip
              odie "brain-break requires Node.js >= 22.0.0 (found #{node_version})" if Version.new(node_version.delete_prefix("v")) < Version.new("22.0.0")

              system "npm", "install"
              system "npm", "run", "build"

              chmod 0755, "dist/index.js"

              libexec.install "dist", "node_modules", "package.json"

              (bin/"brain-break").write_env_script "#{libexec}/dist/index.js",
                PATH: "#{Formula["node"].opt_bin}:$PATH"
            end

            test do
              assert_match "brain-break", shell_output("#{bin}/brain-break 2>&1", 1)
            end
          end
          FORMULA_EOF

          # Remove leading whitespace from heredoc indentation
          sed -i 's/^          //' Formula/brain-break.rb

      - name: Commit and push
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/brain-break.rb
          git commit -m "brain-break ${VERSION}"
          git push

  npm:
    needs: homebrew
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view brain-break@${VERSION} --registry=https://registry.npmjs.org 2>/dev/null; then
            echo "Version ${VERSION} already published to npm, skipping"
          else
            npm pkg set name=brain-break
            npm publish --access public --registry=https://registry.npmjs.org --provenance
          fi
